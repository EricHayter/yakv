syntax = "proto3";

option go_package = "./yakv";

service YakvServer {
  rpc Put (PutRequest) returns (PutResponse);
  rpc Get (GetRequest) returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
}

enum Status {
  SUCCESS = 0;
  FAILURE = 1;
}

message PutResponse {
  Status status = 1;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message GetResponse {
  Status status = 1;
  string value = 2;
}

message GetRequest {
  string key = 1;
}

message DeleteResponse {
  Status status = 1;
}

message DeleteRequest {
  string key = 1;
}
